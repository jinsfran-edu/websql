<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pampero SQL</title>
    <script>
      // Aplica el tema guardado antes del primer render para evitar parpadeo
      (function () {
        try {
          if (localStorage.getItem('websql_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/editor/editor.main.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <button id="themeToggle" class="theme-toggle" type="button" title="Cambiar tema claro/oscuro" aria-label="Cambiar tema">🌙</button>
        <p class="eyebrow">Laboratorio de consultas</p>
        <h1>Pampero SQL</h1>
        <p class="hero-copy">Ejecuta, compara y valida consultas en SQL Server, MySQL y PostgreSQL desde una sola vista.</p>
      </header>

      <div class="layout" id="layout">
        <aside class="panel side-panel">
          <div class="side-tabs">
            <button id="tabSchema" class="side-tab active" type="button">Esquema</button>
            <button id="tabExercises" class="side-tab" type="button">Ejercicios</button>
            <button id="tabHistory" class="side-tab" type="button">Historial</button>
          </div>
          <div id="schemaTree" class="side-content"></div>
          <div id="exerciseList" class="side-content hidden"></div>
          <div id="historyList" class="side-content hidden"></div>
        </aside>

        <section class="panel editor-panel">
          <div class="field-row field-row-split">
            <div>
              <label for="platform">Plataforma</label>
              <select id="platform">
                <option value="sqlserver">SQL Server</option>
                <option value="mysql">MySQL</option>
                <option value="postgresql">PostgreSQL</option>
              </select>
            </div>
            <div>
              <label for="database">Base de datos</label>
              <select id="database">
                <option value="pampero">pampero</option>
              </select>
            </div>
          </div>

          <div class="badge-row">
            <p id="connectionInfo" class="badge"></p>
          </div>

          <div id="exerciseBox" class="exercise-box hidden">
            <div class="exercise-box-head">
              <strong id="exerciseTitle"></strong>
              <button id="exerciseClose" type="button" title="Cerrar ejercicio">✕</button>
            </div>
            <p id="exerciseStatement"></p>
          </div>

          <div class="editor-head">
            <label>Consulta SQL</label>
            <div class="editor-tools">
              <button id="fontDec" class="tool-btn" type="button" title="Reducir tamaño de fuente">A−</button>
              <span id="fontSizeLabel" class="tool-label">14px</span>
              <button id="fontInc" class="tool-btn" type="button" title="Aumentar tamaño de fuente">A+</button>
            </div>
          </div>
          <div id="editorWrap" class="editor-wrap">
            <div id="query-editor"></div>
          </div>
          <p class="resize-hint">Arrastrá el borde inferior para agrandar el editor.</p>

          <div class="actions-row">
            <button id="executeBtn">Ejecutar consulta</button>
            <button id="verifyBtn" class="hidden" type="button">Verificar</button>
            <p class="hint">Atajo: Ctrl/Cmd + Enter</p>
          </div>
          <div id="colSplitter" class="col-splitter" title="Arrastrá para ajustar el ancho del editor"></div>
        </section>

        <section class="panel result-panel">
          <div class="result-head">
            <div class="result-title">
              <h2>Resultado</h2>
              <button id="layoutToggle" class="tool-btn" type="button"></button>
            </div>
            <p id="meta" class="meta"></p>
          </div>
          <div id="verdict" class="hidden"></div>
          <pre id="error" class="error hidden"></pre>
          <div id="tableWrap" class="table-wrap"></div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
    <script src="app.js"></script>
  </body>
</html>
