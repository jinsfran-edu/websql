<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pampero SQL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/editor/editor.main.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">Laboratorio de consultas</p>
        <h1>Pampero SQL</h1>
        <p class="hero-copy">Ejecuta, compara y valida consultas en SQL Server, MySQL y PostgreSQL desde una sola vista.</p>
      </header>

      <div class="layout">
        <aside class="panel side-panel">
          <div class="side-tabs">
            <button id="tabSchema" class="side-tab active" type="button">Esquema</button>
            <button id="tabHistory" class="side-tab" type="button">Historial</button>
          </div>
          <div id="schemaTree" class="side-content"></div>
          <div id="historyList" class="side-content hidden"></div>
        </aside>

        <section class="panel editor-panel">
          <div class="field-row">
            <label for="platform">Plataforma</label>
            <select id="platform">
              <option value="sqlserver">SQL Server</option>
              <option value="mysql">MySQL</option>
              <option value="postgresql">PostgreSQL</option>
            </select>
          </div>

          <div class="badge-row">
            <p id="connectionInfo" class="badge"></p>
          </div>

          <label>Consulta SQL</label>
          <div class="editor-wrap">
            <div id="query-editor"></div>
          </div>

          <div class="actions-row">
            <button id="executeBtn">Ejecutar consulta</button>
            <p class="hint">Atajo: Ctrl/Cmd + Enter</p>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="result-head">
            <h2>Resultado</h2>
            <p id="meta" class="meta"></p>
          </div>
          <pre id="error" class="error hidden"></pre>
          <div id="tableWrap" class="table-wrap"></div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
    <script src="app.js"></script>
  </body>
</html>
